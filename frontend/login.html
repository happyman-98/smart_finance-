<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceOS – Login</title>
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>

  <!-- Logo -->
  <a class="logo" href="#">
    <div class="logo-icon">
      <i class="fa-solid fa-infinity"></i>
    </div>
    <span class="logo-text">FinanceOS</span>
  </a>

  <!-- Card -->
  <div class="card" id="card">
    <div class="card-inner">

      <h1 class="card-title" id="card-title">Welcome <span>Back</span></h1>

      <!-- ── Sign In Panel ── -->
      <div class="panel active" id="panel-signin">

        <div class="input-wrap">
          <input type="email" id="si-email" placeholder="Enter your email" autocomplete="email" />
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
        </div>

        <div class="input-wrap">
          <input type="password" id="si-password" placeholder="Enter your password" autocomplete="current-password" />
          <button class="input-icon" id="si-eye-btn" aria-label="Toggle password visibility">
            <svg id="si-eye-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <div class="row-between">
          <div class="remember" id="remember-row">
            <div class="checkbox-box" id="checkbox">
              <svg class="checkbox-check" width="11" height="11" viewBox="0 0 24 24" fill="none"
                   stroke="#0a0c10" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
            <span class="remember-label">Remember me</span>
          </div>
          <button class="link-btn">Forgot Password?</button>
        </div>

        <button class="btn-primary">LOGIN</button>
      </div>

      <!-- ── Register Panel ── -->
      <div class="panel" id="panel-signup">

        <div class="input-wrap">
          <input type="text" id="su-name" placeholder="Full name" autocomplete="name" />
          <button class="input-icon" id="clear-btn" style="display:none;" aria-label="Clear name">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6"  x2="6"  y2="18"/>
              <line x1="6"  y1="6"  x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <div class="input-wrap">
          <input type="email" id="su-email" placeholder="Email address" autocomplete="email" />
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
        </div>

        <div class="input-wrap">
          <input type="tel" id="su-mobile" placeholder="Mobile number" autocomplete="tel" inputmode="tel" />
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </span>
        </div>

        <div class="input-wrap">
          <input type="password" id="su-password" placeholder="Password (min 6 chars)" autocomplete="new-password" />
          <button class="input-icon" id="su-eye-btn" aria-label="Toggle password visibility">
            <svg id="su-eye-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <span class="field-label">Date of birth</span>
        <div class="dob-row">
          <div class="custom-select" id="su-dob-month">
            <button type="button" class="custom-select-trigger" data-value="">
              <span class="custom-select-label">Month</span>
              <svg class="select-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            <div class="custom-select-menu"></div>
          </div>
          <div class="custom-select" id="su-dob-day">
            <button type="button" class="custom-select-trigger" data-value="">
              <span class="custom-select-label">Day</span>
              <svg class="select-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            <div class="custom-select-menu"></div>
          </div>
          <div class="custom-select" id="su-dob-year">
            <button type="button" class="custom-select-trigger" data-value="">
              <span class="custom-select-label">Year</span>
              <svg class="select-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            <div class="custom-select-menu"></div>
          </div>
        </div>

        <div class="input-wrap">
          <input type="number" id="su-income" placeholder="Monthly income / salary" min="0" inputmode="numeric" />
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
          </span>
        </div>

        <div class="input-wrap">
          <input type="number" id="su-savings-goal" placeholder="Monthly savings goal" min="0" inputmode="numeric" />
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <circle cx="12" cy="12" r="6"/>
              <circle cx="12" cy="12" r="2"/>
            </svg>
          </span>
        </div>

        <div class="spacer"></div>
        <button class="btn-primary">CREATE ACCOUNT</button>
      </div>

      <!-- OR divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or</span>
        <div class="divider-line"></div>
      </div>

      <p class="social-label">Continue with</p>

      <div class="social-row">
        <!-- Google -->
        <button class="social-btn" aria-label="Continue with Google">
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path d="M43.611 20.083H42V20H24v8h11.303C33.654 33.655 29.28 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z" fill="#FFC107"/>
            <path d="M6.306 14.691l6.571 4.819C14.655 15.108 19.001 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z" fill="#FF3D00"/>
            <path d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0124 36c-5.259 0-9.72-3.447-11.571-8.239l-6.516 5.022C9.505 39.556 16.227 44 24 44z" fill="#4CAF50"/>
            <path d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 01-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z" fill="#1976D2"/>
          </svg>
        </button>
        <!-- Facebook -->
        <button class="social-btn" aria-label="Continue with Facebook">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </button>
      </div>

      <!-- Footer -->
      <p class="footer-text" id="footer-text">
        Don't have an account?
        <button class="link-btn" id="footer-link">Register</button>
        quickly
      </p>

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
